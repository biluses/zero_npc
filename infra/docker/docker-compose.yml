name: zero-npc

services:
  postgres:
    image: postgres:16-alpine
    container_name: zero-npc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zero_npc
      POSTGRES_PASSWORD: zero_npc_dev_password
      POSTGRES_DB: zero_npc_dev
    ports:
      # Mapeado a 5544 en host para evitar choque con instancias locales de Postgres
      - "5544:5432"
    volumes:
      - zero_npc_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zero_npc -d zero_npc_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: zero-npc-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Toma TODAS las variables del .env del workspace (apps/api/.env)
    env_file:
      - ../../apps/api/.env
    # Overrides puntuales necesarios para la red Docker (sobrescriben las del .env)
    environment:
      NODE_ENV: production
      APP_PORT: 8000
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgres://zero_npc:zero_npc_dev_password@postgres:5432/zero_npc_dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_SSL: "false"
    ports:
      - "8000:8000"
    healthcheck:
      # Usamos node directamente (sin curl/wget en la imagen minimal)
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://localhost:8000/health',
          r => process.exit(r.statusCode === 200 ? 0 : 1))
          .on('error', () => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    container_name: zero-npc-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: http://localhost:8000
    ports:
      - "3000:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://localhost:3000/',
          r => process.exit(r.statusCode < 500 ? 0 : 1))
          .on('error', () => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  zero_npc_pg:
